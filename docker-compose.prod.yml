services:
  php:
    build:
      context: .
      target: prod
    container_name: jusprime_php_prod
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      APP_ENV: prod
      APP_DEBUG: 0
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_prod:/var/www/app/public/uploads
      - static_prod:/var/www/app/public
    networks:
      - saas_net

  nginx:
    image: nginx:alpine
    container_name: jusprime_nginx_prod
    restart: unless-stopped
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - static_prod:/var/www/app/public:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - php
    networks:
      - saas_net

  db:
    image: postgres:15
    container_name: jusprime_db_prod
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saas_net

networks:
  saas_net:

volumes:
  db_data_prod:
  uploads_prod:
  static_prod: