# Traduções das mensagens de segurança do Symfony para PT-BR
# As chaves devem ser idênticas às strings originais do Symfony (incluindo ponto final)

"Bad credentials.": "E-mail ou senha incorretos. Por favor, verifique seus dados e tente novamente."
"Invalid credentials.": "E-mail ou senha incorretos. Por favor, verifique seus dados e tente novamente."
"Username could not be found.": "E-mail ou senha incorretos. Por favor, verifique seus dados e tente novamente."
"Invalid CSRF token.": "Sua sessão expirou. Por favor, atualize a página e tente novamente."
"Account is disabled.": "Sua conta está desativada. Entre em contato com o administrador para reativá-la."
"Account is locked.": "Sua conta foi temporariamente bloqueada. Aguarde alguns minutos e tente novamente."
"Account has expired.": "Sua conta expirou. Entre em contato com o administrador para renová-la."
"Credentials have expired.": "Sua senha expirou. Por favor, redefina sua senha para continuar."
"Too many failed login attempts, please try again in %minutes% minute.": "Muitas tentativas sem sucesso. Por segurança, aguarde %minutes% minuto antes de tentar novamente."
"Too many failed login attempts, please try again in %minutes% minutes.": "Muitas tentativas sem sucesso. Por segurança, aguarde %minutes% minutos antes de tentar novamente."
