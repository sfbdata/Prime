security:
    password_hashers:
        App\Entity\Auth\User:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\Auth\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        main:
            lazy: true
            provider: app_user_provider
            custom_authenticator: App\Security\UserAuthenticator
            logout:
                path: app_logout
            access_denied_handler: App\Security\AccessDeniedHandler

    access_control:
        # Público: criação de Tenant, login e confirmação de convite
        - { path: ^/tenant/new, roles: PUBLIC_ACCESS }
        - { path: ^/register/confirm, roles: PUBLIC_ACCESS }
        - { path: ^/login, roles: PUBLIC_ACCESS }

        # SUPER_ADMIN acessa a listagem global de tenants
        - { path: ^/tenant$, roles: ROLE_SUPER_ADMIN }

        # A partir daqui: apenas usuário autenticado.
        # Autorização fina (o que pode fazer) é responsabilidade dos controllers
        # via PermissionChecker — não do security.yaml.
        - { path: ^/, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            App\Entity\Auth\User:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
